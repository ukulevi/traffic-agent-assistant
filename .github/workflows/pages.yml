name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]
    paths:
      - "slides/**"
      - ".github/workflows/pages.yml"
  pull_request:
    branches: [ main ]
    paths:
      - "slides/**"
      - ".github/workflows/pages.yml"
    types: [ closed ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Stage public slide assets
        run: |
          mkdir -p _site
          cp slides/index.html _site/
          cp -R slides/css slides/js slides/sections _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
