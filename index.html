<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STWI — SmartTraffic What-If — Báo Cáo Kỹ Thuật v2.0</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&family=Urbanist:wght@400;700;800&family=Azeret+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/slides.css?v=20260621b">
    <link rel="stylesheet" href="css/presentation-tools.css">
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true
            },
            startup: { typeset: false }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
    <div id="loading" style="position:fixed;inset:0;background:#0b0f19;color:white;display:flex;align-items:center;justify-content:center;z-index:9999;">
        <div style="text-align:center;">
            <i class="fa-solid fa-spinner fa-spin" style="font-size:3rem;margin-bottom:20px;color:#38bdf8;"></i>
            <h2 style="font-family:'Be Vietnam Pro',sans-serif;">Đang tải bài thuyết trình STWI...</h2>
            <p style="color:#888;">Vui lòng chờ trong giây lát...</p>
        </div>
    </div>

    <main id="slides_wrapper"></main>

    <div id="audio-hover-area" style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10000;display:none;">
        <div id="audio-container" style="display:flex;align-items:center;gap:10px;background:rgba(0,0,0,0.7);padding:5px 15px;border-radius:30px;">
            <audio id="slide-audio" controls style="height:35px;outline:none;"></audio>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="prevSlide()"><i class="fa-solid fa-chevron-left"></i></button>
        <button class="btn" onclick="togglePresentation()"><i class="fa-solid fa-play"></i></button>
        <button class="btn" onclick="toggleAudioMode()" id="btn-toggle-audio" title="Bật/Tắt Thuyết Minh"><i class="fa-solid fa-volume-xmark"></i></button>
        <button class="btn" onclick="nextSlide()"><i class="fa-solid fa-chevron-right"></i></button>
    </div>

    <div id="counter">1 / --</div>

    <script src="js/presentation.js?v=20260621b"></script>
    <script src="js/presentation-tools.js?v=20260621b"></script>
</body>
</html>
